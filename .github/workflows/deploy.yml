name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: arefev.pro
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            set -e

            cd /home/deploy/www/arefevpro

            echo "===> Pull latest code"
            git pull origin main

            echo "===> Install dependencies"
            npm install

            echo "===> Prisma generate"
            npx prisma generate

            echo "===> Build app"
            npm run build

            echo "===> Restart PM2"
            pm2 reload arefevpro --update-env || pm2 start npm --name "arefevpro" -- start

            echo "===> Save PM2"
            pm2 save